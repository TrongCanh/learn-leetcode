  <line x1="8.5" y1="17" x2="13.5" y2="16.5" stroke="#7c6ff7" stroke-width="1" stroke-linecap="round"/>
  <line x1="8.5" y1="19" x2="13" y2="18.5" stroke="#7c6ff7" stroke-width="1" stroke-linecap="round"/>
