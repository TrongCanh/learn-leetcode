<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <link id="hljs-style" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="app-layout">

<!-- Mobile overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo" onclick="goToList()">
        <div class="sidebar-logo-icon">📚</div>
        <div>
          <div class="sidebar-logo-text">Study Dashboard</div>
          <div class="sidebar-logo-sub">LeetCode Tracker</div>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Đổi giao diện">
        <span class="theme-icon" id="themeIcon">🌙</span>
      </button>
    </div>
    <div class="sidebar-stats" id="sidebarStats"></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileSidebar()">☰</button>
      <button class="back-btn" id="backBtn" onclick="goToList()">
        ← Quay lại
      </button>
      <div class="topbar-title" id="topbarTitle">📚 Study Dashboard</div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="main-scroll" id="main"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-domain" id="modalDomain">CS</div>
      <div class="modal-title" id="modalTitle">Loading...</div>
      <div class="modal-nav">
        <button id="modalPrev" title="Bài trước">◀</button>
        <button id="modalNext" title="Bài tiếp">▶</button>
      </div>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body">
      <div class="preview-loading">⏳ Đang tải nội dung...</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
